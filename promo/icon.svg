<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#0b0e19"/>
  <!-- 星（控えめ） -->
  <g fill="#e9ecf8">
    <circle cx="60" cy="70" r="2.5" opacity="0.5"/>
    <circle cx="330" cy="55" r="2" opacity="0.4"/>
    <circle cx="300" cy="110" r="1.6" opacity="0.35"/>
    <circle cx="90" cy="320" r="2" opacity="0.35"/>
    <circle cx="200" cy="45" r="1.8" opacity="0.4"/>
    <circle cx="45" cy="200" r="1.5" opacity="0.3"/>
    <circle cx="360" cy="190" r="1.5" opacity="0.3"/>
  </g>
  <!-- 線路 -->
  <path d="M24 336 H376" stroke="#2c3554" stroke-width="12" stroke-linecap="round"/>
  <!-- 蒸気機関車（右向き・オリジナル） -->
  <g fill="#d9a95c">
    <!-- キャブ（運転室） -->
    <rect x="64" y="148" width="78" height="140" rx="10"/>
    <!-- キャブの窓 -->
    <rect x="78" y="164" width="48" height="44" rx="9" fill="#0b0e19"/>
    <!-- ボイラー -->
    <rect x="134" y="196" width="162" height="92" rx="28"/>
    <!-- 煙突 -->
    <rect x="248" y="140" width="24" height="60" rx="5"/>
    <rect x="240" y="130" width="40" height="18" rx="7"/>
    <!-- スチームドーム -->
    <circle cx="192" cy="198" r="15"/>
    <!-- カウキャッチャー（排障器） -->
    <path d="M292 282 L344 330 H292 Z"/>
    <!-- 前照灯 -->
    <circle cx="302" cy="222" r="9" fill="#0b0e19"/>
    <circle cx="302" cy="222" r="4.5"/>
  </g>
  <!-- 動輪 3つ -->
  <g fill="#0b0e19" stroke="#d9a95c" stroke-width="11">
    <circle cx="104" cy="306" r="24"/>
    <circle cx="178" cy="306" r="24"/>
    <circle cx="252" cy="306" r="24"/>
  </g>
  <!-- 進行方向の先にある駅マーカー -->
  <circle cx="356" cy="336" r="11" fill="#d9a95c"/>
  <circle cx="356" cy="336" r="20" fill="none" stroke="#d9a95c" stroke-width="4" opacity="0.4"/>
</svg>
